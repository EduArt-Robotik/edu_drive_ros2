###
# Parameter File for the JoyIt Mecanum Kit
# 
# Wheel diameter: 65 mm
# Motor Voltage: 6 V -> maxPulseWidth: 25
# Rated RPM: 200
# Gear Ratio: 21.3
# Encoder: 11 pulses per revolution (needs to be multiplied by 4)
#
# TODO: Calculate third value of kinematics vector!
###

/**:
  ros__parameters:
    usingPowerManagementBoard: true
    verbosity: false
    canInterface: CAN2
    frequencyScale: 32
    inputWeight: 0.2
    maxPulseWidth: 25
    timeout: 300
    kp: 0.5
    ki: 7.0
    kd: 0.0
    antiWindup: 1
    responseMode: 0
    
    controllers: 2
    
    controller0:
      canID: 0
      drive0: #front right
        channel: 0
        kinematics: [30.77, 30.77, 6.1]
        gearRatio: 21.3
        encoderRatio: 44.0
        rpmMax: 200.0
        invertEnc: 0
      drive1: #rear right
        channel: 1
        kinematics: [30.77, -30.77, 6.1]
        gearRatio: 21.3
        encoderRatio: 44.0
        rpmMax: 200.0
        invertEnc: 0

    controller1:
      canID: 1
      drive0: #front left
        channel: 0
        kinematics: [-30.77, 30.77, 6.1]
        gearRatio: 21.3
        encoderRatio: 44.0
        rpmMax: 200.0
        invertEnc: 0
      drive1: #rear left
        channel: 1
        kinematics: [-30.77, -30.77, 6.1]
        gearRatio: 21.3
        encoderRatio: 44.0
        rpmMax: 200.0
        invertEnc: 0
